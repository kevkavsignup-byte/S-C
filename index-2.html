<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>6M Strength</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' fill='%230d0d0d'/><rect x='16' y='86' width='160' height='20' rx='4' fill='%23e63946'/><rect x='40' y='60' width='16' height='72' rx='4' fill='%23e63946'/><rect x='136' y='60' width='16' height='72' rx='4' fill='%23e63946'/><rect x='20' y='74' width='28' height='44' rx='6' fill='%23c1121f'/><rect x='144' y='74' width='28' height='44' rx='6' fill='%23c1121f'/><text x='96' y='148' font-family='Arial Black' font-size='22' font-weight='900' fill='%23e63946' text-anchor='middle'>6M</text></svg>">
<meta name="theme-color" content="#0d0d0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d0d0d;--surf:#111;--surf2:#161616;--surf3:#1a1a1a;
  --border:#222;--border2:#1a1a1a;
  --accent:#e63946;--accent-dim:rgba(230,57,70,0.12);
  --text:#f0ede8;--text2:#aaa8a4;--text3:#666;--text4:#444;
  --green:#5cb85c;--green-dim:rgba(92,184,92,0.12);
  --font-display:'Barlow Condensed',sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
  --nav-h:64px;--safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-mono);overflow-x:hidden}
#app{min-height:100vh;padding-bottom:calc(var(--nav-h) + var(--safe-bottom))}
/* SCROLLBAR */
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
/* BOTTOM NAV */
#nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h) + var(--safe-bottom));background:rgba(10,10,10,0.97);border-top:1px solid var(--border);display:flex;align-items:flex-start;padding-top:0;backdrop-filter:blur(10px);z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:12px 0 0;border:none;background:none;color:var(--text4);font-family:var(--font-mono);font-size:8px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:color .15s}
.nav-btn.active{color:var(--accent)}
.nav-icon{font-size:20px;line-height:1}
/* HEADER */
.hdr{background:var(--surf);border-bottom:1px solid var(--border);padding:52px 16px 14px;position:sticky;top:0;z-index:50;backdrop-filter:blur(8px)}
.hdr-sub{font-size:9px;letter-spacing:.2em;color:var(--accent);text-transform:uppercase;margin-bottom:3px}
.hdr-title{font-family:var(--font-display);font-size:26px;font-weight:900;letter-spacing:.01em;line-height:1}
.hdr-back{display:flex;align-items:center;gap:8px;border:none;background:none;color:var(--text3);font-family:var(--font-mono);font-size:11px;cursor:pointer;padding:0 0 8px}
/* CARDS */
.card{background:var(--surf);border:1px solid var(--border);border-radius:6px;overflow:hidden;margin:12px 16px}
.card-hdr{padding:14px 16px;border-bottom:1px solid var(--border2);display:flex;justify-content:space-between;align-items:center}
.card-hdr-title{font-family:var(--font-display);font-size:16px;font-weight:700;letter-spacing:.04em}
.card-body{padding:14px 16px}
/* BUTTONS */
.btn{border:none;border-radius:4px;font-family:var(--font-display);font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn-primary{background:var(--accent);color:#fff;padding:14px 20px;font-size:15px;width:100%}
.btn-primary:active{opacity:.85;transform:scale(.98)}
.btn-secondary{background:var(--surf3);color:var(--text2);padding:10px 16px;font-size:13px;border:1px solid var(--border)}
.btn-ghost{background:none;color:var(--text3);padding:8px 12px;font-size:12px;border:1px solid var(--border2)}
.btn-danger{background:rgba(230,57,70,.15);color:var(--accent);padding:10px 16px;font-size:13px;border:1px solid rgba(230,57,70,.25)}
.btn-success{background:var(--green);color:#fff;padding:14px 20px;font-size:15px;width:100%}
/* CHIPS */
.chip{display:inline-block;font-size:9px;letter-spacing:.12em;text-transform:uppercase;padding:3px 8px;border-radius:2px;font-weight:600}
.chip-accent{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(230,57,70,.25)}
.chip-green{background:var(--green-dim);color:var(--green);border:1px solid rgba(92,184,92,.25)}
.chip-muted{background:var(--surf3);color:var(--text4);border:1px solid var(--border2)}
/* INPUTS */
input[type=number],input[type=text]{background:var(--surf3);border:1px solid var(--border);border-radius:3px;color:var(--text);font-family:var(--font-display);font-size:18px;font-weight:700;text-align:center;width:100%;padding:10px 6px;-moz-appearance:textfield;outline:none;transition:border-color .15s}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input[type=number]:focus,input[type=text]:focus{border-color:var(--accent)}
/* DIVIDER */
.divider{height:1px;background:var(--border2);margin:0 16px}
/* SECTION LABEL */
.section-label{font-size:8px;font-weight:600;letter-spacing:.2em;color:var(--text4);text-transform:uppercase;padding:16px 16px 8px}
/* TAG STRIP */
.tag-strip{display:flex;gap:6px;flex-wrap:wrap;padding:0 16px 12px}
/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--border)}
.stat-cell{background:var(--surf);padding:14px 0;text-align:center}
.stat-val{font-family:var(--font-display);font-size:24px;font-weight:900;color:var(--text)}
.stat-key{font-size:8px;letter-spacing:.14em;color:var(--text4);text-transform:uppercase;margin-top:2px}
/* EXERCISE CARD */
.ex-card{border:1px solid var(--border);border-radius:5px;margin:0 16px 12px;overflow:hidden}
.ex-hdr{background:var(--surf2);padding:12px 14px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.ex-name{font-family:var(--font-display);font-size:17px;font-weight:700;letter-spacing:.02em;line-height:1.2}
.ex-note{font-size:9px;color:var(--text3);margin-top:3px;line-height:1.5}
.ex-prev{font-size:9px;color:var(--green);letter-spacing:.06em}
.set-row{display:grid;grid-template-columns:28px 1fr 1fr 36px;gap:8px;padding:10px 14px;border-top:1px solid var(--border2);align-items:center}
.set-num{font-size:10px;color:var(--text4);font-weight:600;text-align:center}
.set-done{width:32px;height:32px;border-radius:3px;border:1px solid var(--border);background:var(--surf3);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:all .15s;flex-shrink:0}
.set-done.checked{background:var(--green);border-color:var(--green);color:#fff}
.set-label{font-size:8px;color:var(--text4);text-align:center;margin-top:2px;letter-spacing:.08em;text-transform:uppercase}
/* MOBILITY ROW */
.mob-row{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-top:1px solid var(--border2);gap:12px}
.mob-check{width:24px;height:24px;border-radius:2px;border:1px solid var(--border);background:var(--surf3);display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;transition:all .15s;flex-shrink:0}
.mob-check.checked{background:var(--green);border-color:var(--green)}
.mob-name{font-family:var(--font-display);font-size:14px;font-weight:600;flex:1;line-height:1.2}
.mob-dur{font-size:9px;color:var(--accent);font-weight:500;white-space:nowrap}
.mob-cue{font-size:9px;color:var(--text4);line-height:1.5;margin-top:2px}
/* HISTORY ITEM */
.hist-item{padding:14px 16px;border-bottom:1px solid var(--border2);display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.hist-item:active{background:var(--surf2)}
/* READINESS SPECIFIC */
.ready-score-ring{position:relative;width:140px;height:140px;margin:0 auto}
.ready-score-ring svg{transform:rotate(-90deg)}
.ready-score-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.ready-score-num{font-family:var(--font-display);font-size:44px;font-weight:900;line-height:1}
.ready-score-label{font-size:9px;letter-spacing:.16em;text-transform:uppercase;margin-top:2px}
.ready-traffic{display:flex;gap:8px;justify-content:center;margin:16px 0}
.ready-light{width:20px;height:20px;border-radius:50%;opacity:.2}
.ready-light.on{opacity:1}
.slider-wrap{padding:0 16px 16px}
.slider-label{display:flex;justify-content:space-between;margin-bottom:8px}
.slider-name{font-size:11px;color:var(--text2);letter-spacing:.04em}
.slider-val{font-family:var(--font-display);font-size:18px;font-weight:900;color:var(--accent)}
input[type=range]{-webkit-appearance:none;width:100%;height:6px;background:var(--surf3);border-radius:3px;outline:none;border:1px solid var(--border)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--bg)}
input[type=range]::-webkit-slider-runnable-track{height:6px;border-radius:3px}
.soreness-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px 16px}
.soreness-zone{background:var(--surf2);border:1px solid var(--border);border-radius:5px;padding:10px 12px}
.soreness-zone-name{font-size:10px;color:var(--text3);letter-spacing:.06em;margin-bottom:6px;text-transform:uppercase}
.soreness-zone-val{font-family:var(--font-display);font-size:22px;font-weight:900;text-align:center;margin:4px 0}
.soreness-btns{display:flex;justify-content:center;gap:6px}
.s-btn{width:28px;height:28px;border-radius:3px;border:1px solid var(--border);background:var(--surf3);color:var(--text2);font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s}
.s-btn:active{transform:scale(.92)}
.step-dots{display:flex;gap:6px;justify-content:center;padding:12px 0}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--surf3);border:1px solid var(--border);transition:all .2s}
.step-dot.active{background:var(--accent);border-color:var(--accent)}
.step-dot.done{background:var(--green);border-color:var(--green)}
.rec-item{display:flex;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border2);align-items:flex-start}
.rec-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.rec-text{font-size:11px;color:var(--text2);line-height:1.6}
.rec-title{font-family:var(--font-display);font-size:14px;font-weight:700;letter-spacing:.04em;color:var(--text);margin-bottom:2px}
.factor-row{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border2)}
.factor-label{font-size:10px;color:var(--text3)}
.factor-bar{flex:1;height:4px;background:var(--surf3);border-radius:2px;margin:0 12px;overflow:hidden}
.factor-fill{height:100%;border-radius:2px;transition:width .4s ease}
.factor-score{font-family:var(--font-display);font-size:14px;font-weight:700;min-width:30px;text-align:right}
.history-chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:2px;font-size:9px;font-weight:600;letter-spacing:.1em}
.trend-up{color:var(--green)}
.trend-down{color:var(--accent)}
.trend-flat{color:var(--text4)}
/* STEP NAV */
.step-nav{display:flex;gap:8px;padding:16px 16px 0}
{padding:0 16px 6px}
.prog-bar-label{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:4px}
.prog-bar-track{height:6px;background:var(--surf3);border-radius:3px;overflow:hidden}
.prog-bar-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .4s ease}
/* BLOCK SELECTOR */
.block-scroller{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;scrollbar-width:none}
.block-scroller::-webkit-scrollbar{display:none}
.block-pill{flex-shrink:0;border:1px solid var(--border);border-radius:4px;padding:10px 14px;cursor:pointer;transition:all .15s;background:var(--surf)}
.block-pill.active{border-color:var(--accent);border-top-width:2px;background:var(--surf2)}
.block-pill-label{font-family:var(--font-display);font-size:13px;font-weight:700;letter-spacing:.06em;color:var(--text3)}
.block-pill.active .block-pill-label{color:var(--accent)}
.block-pill-sub{font-family:var(--font-display);font-size:16px;font-weight:900;color:var(--text4);margin-top:1px}
.block-pill.active .block-pill-sub{color:var(--text)}
/* WEEK TABS */
.week-tabs{display:flex;gap:6px;padding:0 16px 12px;overflow-x:auto;scrollbar-width:none}
.week-tab{flex:1;min-width:70px;border:1px solid var(--border2);border-radius:3px;padding:8px 6px;text-align:center;cursor:pointer;background:var(--surf);transition:all .15s}
.week-tab.active{border-color:var(--border);border-top:2px solid var(--accent);background:var(--surf2)}
.week-tab-label{font-size:8px;letter-spacing:.12em;color:var(--text4);text-transform:uppercase}
.week-tab.active .week-tab-label{color:var(--accent)}
.week-tab-scheme{font-family:var(--font-display);font-size:16px;font-weight:900;color:var(--text4);margin-top:2px}
.week-tab.active .week-tab-scheme{color:var(--text)}
/* SESSION TABS */
.sess-tabs{display:flex;gap:6px;padding:0 16px 12px}
.sess-tab{flex:1;border:1px solid var(--border);border-radius:3px;padding:12px 6px;text-align:center;cursor:pointer;background:var(--surf);transition:all .15s;font-family:var(--font-display);font-weight:700;letter-spacing:.08em;font-size:13px;color:var(--text3)}
.sess-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
/* COLLAPSIBLE */
.collapsible-hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer;border-bottom:1px solid var(--border2)}
.collapsible-hdr-l{display:flex;align-items:center;gap:10px}
.collapsible-icon{width:26px;height:26px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.collapsible-icon.mob{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(230,57,70,.3)}
.collapsible-icon.main{background:var(--accent);color:#fff}
.collapsible-icon.cool{background:var(--green-dim);color:var(--green);border:1px solid rgba(92,184,92,.25)}
.collapsible-title{font-family:var(--font-display);font-size:15px;font-weight:700;letter-spacing:.06em}
.collapsible-meta{font-size:8px;color:var(--text4);letter-spacing:.1em;margin-top:1px}
.toggle-arrow{color:var(--text4);font-size:14px;transition:transform .2s}
.toggle-arrow.open{transform:rotate(180deg)}
/* WORKOUT HEADER */
.wkt-hdr{background:var(--surf);border-bottom:1px solid var(--border);padding:52px 16px 14px;position:sticky;top:0;z-index:50}
.wkt-progress{height:3px;background:var(--surf3);border-radius:2px;margin-top:10px;overflow:hidden}
.wkt-progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s ease}
/* TIMER */
.timer-display{font-family:var(--font-display);font-size:32px;font-weight:900;color:var(--accent);letter-spacing:.02em}
/* REST TIMER */
.rest-overlay{position:fixed;bottom:calc(var(--nav-h) + 12px);left:16px;right:16px;background:var(--surf2);border:1px solid var(--border);border-radius:6px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;z-index:90;box-shadow:0 4px 20px rgba(0,0,0,.5)}
/* TOAST */
#toast{position:fixed;bottom:calc(var(--nav-h) + 16px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--surf2);border:1px solid var(--border);border-radius:4px;padding:10px 20px;font-size:11px;letter-spacing:.06em;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;z-index:200}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* ADD SET BTN */
.add-set-row{padding:10px 14px;border-top:1px solid var(--border2)}
/* ANIMATIONS */
@keyframes fadeSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-slide{animation:fadeSlide .22s ease forwards}
/* HOME SPECIFIC */
.next-sess-card{background:var(--surf);border:1px solid var(--border);border-radius:8px;margin:12px 16px;overflow:hidden}
.next-sess-top{padding:16px;border-bottom:1px solid var(--border2)}
.next-sess-label{font-size:9px;letter-spacing:.18em;color:var(--text4);text-transform:uppercase;margin-bottom:4px}
.next-sess-name{font-family:var(--font-display);font-size:22px;font-weight:900;letter-spacing:.02em}
.next-sess-focus{font-size:10px;color:var(--text3);margin-top:3px;line-height:1.5}
.streak-badge{display:flex;align-items:center;gap:6px;font-family:var(--font-display);font-size:14px;font-weight:700;color:var(--accent)}
/* EMPTY STATE */
.empty{padding:40px 16px;text-align:center;color:var(--text4);font-size:11px;line-height:1.8;letter-spacing:.04em}
.empty-icon{font-size:40px;margin-bottom:12px;display:block;opacity:.4}
/* PREV BEST BADGE */
.prev-best{background:rgba(92,184,92,.08);border:1px solid rgba(92,184,92,.2);border-radius:3px;padding:3px 8px;font-size:9px;color:var(--green);letter-spacing:.06em;white-space:nowrap}
/* SCHEME BADGE */
.scheme-badge{background:var(--accent-dim);border:1px solid rgba(230,57,70,.3);border-radius:3px;padding:4px 10px;font-family:var(--font-display);font-size:16px;font-weight:900;color:var(--accent)}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>
<nav id="nav">
  <button class="nav-btn active" data-nav="home" onclick="nav('home')">
    <span class="nav-icon">⌂</span>HOME
  </button>
  <button class="nav-btn" data-nav="programme" onclick="nav('programme')">
    <span class="nav-icon">☰</span>PLAN
  </button>
  <button class="nav-btn" data-nav="readiness" onclick="nav('readiness')">
    <span class="nav-icon">◈</span>READINESS
  </button>
  <button class="nav-btn" data-nav="history" onclick="nav('history')">
    <span class="nav-icon">◷</span>LOG
  </button>
  <button class="nav-btn" data-nav="settings" onclick="nav('settings')">
    <span class="nav-icon">⚙</span>SETTINGS
  </button>
</nav>
<script>
// ═══════════════════════════════════════════════════════
// PROGRAMME DATA
// ═══════════════════════════════════════════════════════
const BLOCKS=[
{id:1,label:"Block 1",months:"Months 1–2",theme:"Foundation",
loading:[

{week:4,scheme:"3 × 15",sets:3,reps:15,intensity:"50% DELOAD",note:"DELOAD — flush, recover, reassess",isDeload:true}
],
sessions:{
upper:{label:"Upper A",focus:"Chest + Upper Back",

{name:"Cat-Cow",duration:"8 reps",cue:"Initiate from hips, finish at neck"}
],
exercises:[

cooldown:[

]},
lower:{label:"Lower A",focus:"Quads + Hamstrings",
mobility:[
{name:"Hip 90/90 Stretch",duration:"60s each",cue:"Sit tall, drive hip into floor"},

{name:"Glute Bridge Activation",duration:"12 reps",cue:"Squeeze glutes at top"}

exercises:[
{name:"Back Squat",isPrimary:true,notes:"Chest up, knees track toes, break parallel"},
{name:"Romanian Deadlift",notes:"Hinge hips, soft knee, bar close to legs"},
{name:"Walking Lunges (DB)",notes:"Knee hovers 1\" off floor, upright torso"},

// DATABASE
// ═══════════════════════════════════════════════════════
const DB={
  getSettings:()=>{try{return JSON.parse(localStorage.getItem('s6m_settings'))||{startDate:null,unit:'kg'}}catch{return{startDate:null,unit:'kg'}}},
  saveSettings:(s)=>localStorage.setItem('s6m_settings',JSON.stringify(s)),
  getWorkouts:()=>{try{return JSON.parse(localStorage.getItem('s6m_workouts'))||{}}catch{return{}}},
  saveWorkout:(w)=>{const all=DB.getWorkouts();all[w.id]=w;localStorage.setItem('s6m_workouts',JSON.stringify(all))},
  deleteWorkout:(id)=>{const all=DB.getWorkouts();delete all[id];localStorage.setItem('s6m_workouts',JSON.stringify(all))},
  getWorkoutList:()=>Object.values(DB.getWorkouts()).sort((a,b)=>new Date(b.date)-new Date(a.date)),
  getReadinessLog:()=>{try{return JSON.parse(localStorage.getItem('s6m_readiness'))||[]}catch{return[]}},
  saveReadiness:(entry)=>{
    const log=DB.getReadinessLog();
    const idx=log.findIndex(r=>r.date===entry.date);
    if(idx>=0)log[idx]=entry; else log.unshift(entry);
    log.splice(20); // keep last 20 entries
    localStorage.setItem('s6m_readiness',JSON.stringify(log));
  },
  getTodayReadiness:()=>{
    const log=DB.getReadinessLog();
    return log.find(r=>r.date===today())||null;
  },
  getHRBaseline:()=>{
    const log=DB.getReadinessLog().filter(r=>r.restingHR>0);
    if(log.length<3)return null;
    const recent=log.slice(0,7).map(r=>r.restingHR);
    return Math.round(recent.reduce((a,b)=>a+b,0)/recent.length);
  },
  getExerciseHistory:(name)=>{
    return Object.values(DB.getWorkouts())
      .filter(w=>w.completed&&w.exercises&&w.exercises.some(e=>e.name===name))
      .sort((a,b)=>new Date(b.date)-new Date(a.date))
      .slice(0,12)
      .map(w=>({date:w.date,blockLabel:w.blockLabel,weekLabel:w.weekLabel,sets:w.exercises.find(e=>e.name===name)?.sets||[]}))
  },
  getPrevBest:(name)=>{
    const h=DB.getExerciseHistory(name);
    const allSets=h.flatMap(s=>s.sets.filter(set=>parseFloat(set.weight)>0));
    if(!allSets.length)return null;
    return allSets.reduce((max,s)=>parseFloat(s.weight)>parseFloat(max.weight)?s:max,allSets[0]);
  },
  getLastSets:(name)=>{
    const h=DB.getExerciseHistory(name);
    return h.length?h[0].sets:[];
  }
};

  return dt.toLocaleDateString('en-IE',{day:'numeric',month:'short',year:'numeric'});
}
function fmtDateShort(d){
  const dt=new Date(d+'T00:00:00');
  return dt.toLocaleDateString('en-IE',{day:'numeric',month:'short'});
}
function today(){return new Date().toISOString().split('T')[0]}
function getCurrentRecommendation(){
  const settings=DB.getSettings();
  if(!settings.startDate)return{block:0,week:0,session:'upper'};
  const start=new Date(settings.startDate);
  const now=new Date();
  const daysDiff=Math.floor((now-start)/(1000*60*60*24));
  const workoutDay=daysDiff%21; // 3 weeks * 7 days cycle within each 4-week block
  const blockIdx=Math.min(Math.floor(daysDiff/28),5);
  const weekInBlock=Math.min(Math.floor((daysDiff%28)/7),3);
  const sessions=['upper','lower','total'];
  const sessionIdx=Math.floor((daysDiff%3));
  return{block:blockIdx,week:weekInBlock,session:sessions[sessionIdx%3]};
}
function getStreak(){
  const workouts=DB.getWorkoutList().filter(w=>w.completed);
  if(!workouts.length)return 0;
  let streak=0;
  const now=new Date();
  let checkDate=new Date(now);
  checkDate.setHours(0,0,0,0);
  for(let i=0;i<60;i++){
    const ds=checkDate.toISOString().split('T')[0];
    if(workouts.some(w=>w.date===ds)){streak++;checkDate.setDate(checkDate.getDate()-1);}
    else if(i===0&&!workouts.some(w=>w.date===ds)){checkDate.setDate(checkDate.getDate()-1);}
    else break;
  }
  return streak;
}
function getMaxWeight(sets){
  const weights=sets.filter(s=>parseFloat(s.weight)>0).map(s=>parseFloat(s.weight));
  return weights.length?Math.max(...weights):0;
}
function sessionTypeLabel(t){return t==='upper'?'UPPER':t==='lower'?'LOWER':'TOTAL BODY'}
function sessionTypeIcon(t){return t==='upper'?'↑':t==='lower'?'↓':'◎'}
function blockById(id){return BLOCKS.find(b=>b.id===id)}
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}

// START WORKOUT
// ═══════════════════════════════════════════════════════
function startWorkout(blockIdx,weekIdx,sessionType){
  const block=BLOCKS[blockIdx];
  const week=block.loading[weekIdx];
  const session=block.sessions[sessionType];
  const settings=DB.getSettings();
  if(!settings.startDate){settings.startDate=today();DB.saveSettings(settings);}
  const unit=settings.unit||'kg';
  // Build workout object
  const exercises=session.exercises.map(ex=>{
    const sets=ex.isPrimary?week.sets:(ex.defaultSets||3);
    const reps=ex.isPrimary?week.reps:(ex.defaultReps||week.reps);
    const lastSets=DB.getLastSets(ex.name);
    const prevBest=DB.getPrevBest(ex.name);
    const suggestedWeight=lastSets.length&&parseFloat(lastSets[0].weight)>0?lastSets[0].weight:'';
    return{
      name:ex.name,notes:ex.notes||'',isPrimary:ex.isPrimary||false,
      defaultSets:sets,defaultReps:reps,
      prevBest:prevBest,
      sets:Array.from({length:sets},(_,i)=>({
        weight:suggestedWeight,
        reps:typeof reps==='number'?reps:'',
        done:false
      }))
    };
  });
  const mobility=session.mobility.map(m=>({...m,done:false}));
  const cooldown=session.cooldown.map(c=>({...c,done:false}));
  S.workout={
    id:`wkt_${Date.now()}`,
    blockId:block.id,blockLabel:block.label,
    weekNum:weekIdx,weekLabel:week.scheme,
    sessionType,sessionLabel:session.label,sessionFocus:session.focus,
    date:today(),
    completed:false,
    scheme:week.scheme,
    intensity:week.intensity,
    unit,
    phase:'mobility', // mobility | main | cooldown
    exercises,mobility,cooldown,
    startTime:Date.now()
  };
  nav('workout');
}
function viewSession(blockIdx,weekIdx,sessionType){
  S.prog={block:blockIdx,week:weekIdx,session:sessionType,open:'main'};
  nav('programme');
}

// Workout interactions
function updateSet(ei,si,field,val){
  if(!S.workout)return;
  S.workout.exercises[ei].sets[si][field]=field==='weight'?parseFloat(val)||'':val;
  DB.saveWorkout(S.workout);
  // Partial re-render - just update progress
  const doneExercises=S.workout.exercises.filter(e=>e.sets.every(s=>s.done)).length;
  const pct=Math.round((doneExercises/S.workout.exercises.length)*100);
  const fill=document.querySelector('.wkt-progress-fill');
  if(fill)fill.style.width=pct+'%';
}
function toggleSet(ei,si){
  if(!S.workout)return;
  S.workout.exercises[ei].sets[si].done=!S.workout.exercises[ei].sets[si].done;
  DB.saveWorkout(S.workout);
  render();
}
function addSet(ei){
  if(!S.workout)return;
  const ex=S.workout.exercises[ei];
  const lastSet=ex.sets[ex.sets.length-1];
  ex.sets.push({weight:lastSet?.weight||'',reps:lastSet?.reps||'',done:false});
  DB.saveWorkout(S.workout);
  render();
}
function removeSet(ei){
  if(!S.workout)return;
  const ex=S.workout.exercises[ei];
  if(ex.sets.length>1)ex.sets.pop();
  DB.saveWorkout(S.workout);
  render();
}
function toggleMobility(i){
  if(!S.workout)return;
  S.workout.mobility[i].done=!S.workout.mobility[i].done;
  DB.saveWorkout(S.workout);
  render();
}
function toggleCooldown(i){
  if(!S.workout)return;
  S.workout.cooldown[i].done=!S.workout.cooldown[i].done;
  DB.saveWorkout(S.workout);
  render();
}
function completeWorkout(){
  if(!S.workout)return;
  const setsLogged=S.workout.exercises.some(e=>e.sets.some(s=>parseFloat(s.weight)>0||s.done));
  if(!setsLogged&&!confirm('No weights logged — still complete?'))return;
  S.workout.completed=true;
  S.workout.duration=Math.round((Date.now()-S.workout.startTime)/60000);
  DB.saveWorkout(S.workout);
  toast('✓ Workout saved!');
  S.workout=null;
  nav('history');
}
function abandonWorkout(){
  if(confirm('Abandon this workout? Progress will be lost.')){
    S.workout=null;nav('home');
  }
}

// ═══════════════════════════════════════════════════════
// READINESS ALGORITHM
// ═══════════════════════════════════════════════════════
function calcReadiness(d){
  const factors={};
  // ── SLEEP DURATION (0-25pts) ────────────────────────
  const h=parseFloat(d.sleepHours)||7;
  let sleepDurScore=25;
  if(h>=7&&h<=9)sleepDurScore=25;
  else if(h>=6.5&&h<7)sleepDurScore=20;
  else if(h>9&&h<=10)sleepDurScore=22;
  else if(h>=6&&h<6.5)sleepDurScore=14;
  else if(h>=5&&h<6)sleepDurScore=7;
  else sleepDurScore=0;
  factors.sleepDuration={score:sleepDurScore,max:25,label:'Sleep Duration',value:`${h}h`};

  // ── SLEEP QUALITY (0-20pts) ─────────────────────────
  const sq=parseInt(d.sleepQuality)||5;
  const sleepQScore=Math.round((sq/10)*20);
  factors.sleepQuality={score:sleepQScore,max:20,label:'Sleep Quality',value:`${sq}/10`};

  // ── SORENESS (0-20pts) ──────────────────────────────
  const zones=Object.values(d.soreness||{});
  const avgSoreness=zones.length?zones.reduce((a,b)=>a+b,0)/zones.length:0;
  const maxSoreness=zones.length?Math.max(...zones):0;
  // Penalise high peak soreness more than average
  const sorenessScore=Math.max(0,20-Math.round(avgSoreness*1.5)-Math.round(maxSoreness*0.5));
  factors.soreness={score:sorenessScore,max:20,label:'Muscle Soreness',value:`Avg ${avgSoreness.toFixed(1)}/10`};

  // ── MOOD & MOTIVATION (0-15pts) ─────────────────────
  const mood=parseInt(d.mood)||5;
  const motiv=parseInt(d.motivation)||5;
  const moodScore=Math.round(((mood+motiv)/20)*15);
  factors.mood={score:moodScore,max:15,label:'Mood & Motivation',value:`${mood}/10 · ${motiv}/10`};

  // ── STRESS (0-10pts) ────────────────────────────────
  const stress=parseInt(d.stress)||5;
  const stressScore=Math.round(((10-stress)/10)*10);
  factors.stress={score:stressScore,max:10,label:'Stress Level',value:`${stress}/10`};

  // ── RESTING HR vs BASELINE (0-10pts) ────────────────
  let hrScore=5; // neutral if no data
  const baseline=DB.getHRBaseline();
  if(d.restingHR>0&&baseline){
    const diff=d.restingHR-baseline;
    if(diff<=0)hrScore=10;
    else if(diff<=2)hrScore=9;
    else if(diff<=4)hrScore=7;
    else if(diff<=7)hrScore=4;
    else if(diff<=10)hrScore=2;
    else hrScore=0;
    factors.restingHR={score:hrScore,max:10,label:'Resting HR',value:`${d.restingHR}bpm (base: ${baseline})`};
  } else if(d.restingHR>0){
    hrScore=5;
    factors.restingHR={score:hrScore,max:10,label:'Resting HR',value:`${d.restingHR}bpm (no baseline yet)`};
  } else {
    factors.restingHR={score:hrScore,max:10,label:'Resting HR',value:'Not entered'};
  }

  // ── HRV BONUS (0-5pts) ──────────────────────────────
  let hrvScore=0;
  if(d.hrv>0){
    // Simple: higher HRV is better. We give up to 5 bonus points.
    // Average HRV varies widely; we use relative feel (>50ms good, <20ms poor)
    if(d.hrv>=60)hrvScore=5;
    else if(d.hrv>=45)hrvScore=4;
    else if(d.hrv>=30)hrvScore=3;
    else if(d.hrv>=20)hrvScore=1;
    factors.hrv={score:hrvScore,max:5,label:'HRV',value:`${d.hrv}ms`};
  } else {
    factors.hrv={score:0,max:5,label:'HRV',value:'Not entered (optional)'};
  }

  const total=Object.values(factors).reduce((a,f)=>a+f.score,0);
  const maxTotal=Object.values(factors).reduce((a,f)=>a+f.max,0);
  const pct=Math.round((total/maxTotal)*100);

  return{score:pct,factors,total,maxTotal};
}

function getReadinessStatus(score){
  if(score>=80)return{label:'READY TO TRAIN',color:'#5cb85c',bg:'rgba(92,184,92,0.1)',border:'rgba(92,184,92,0.3)',light:'green',emoji:'🟢'};
  if(score>=60)return{label:'MODIFIED SESSION',color:'#f4a261',bg:'rgba(244,162,97,0.1)',border:'rgba(244,162,97,0.3)',light:'amber',emoji:'🟡'};
  if(score>=40)return{label:'LIGHT ONLY',color:'#e76f51',bg:'rgba(231,111,81,0.1)',border:'rgba(231,111,81,0.3)',light:'orange',emoji:'🟠'};
  return{label:'REST DAY',color:'#e63946',bg:'rgba(230,57,70,0.1)',border:'rgba(230,57,70,0.3)',light:'red',emoji:'🔴'};
}

function getReadinessRecommendations(score,data,sessionType){
  const recs=[];
  const zones=data.soreness||{};
  const h=parseFloat(data.sleepHours)||7;
  const sq=parseInt(data.sleepQuality)||5;
  const stress=parseInt(data.stress)||5;

  // Session-specific soreness warnings
  const upperMuscles=['chest','back','shoulders','arms'];
  const lowerMuscles=['quads','hamstrings','glutes','calves'];
  const relevantMuscles=sessionType==='upper'?upperMuscles:sessionType==='lower'?lowerMuscles:[...upperMuscles,...lowerMuscles];
  const soreMuscles=relevantMuscles.filter(m=>(zones[m]||0)>=6).map(m=>m.charAt(0).toUpperCase()+m.slice(1));
  if(soreMuscles.length){
    recs.push({icon:'⚠️',title:'Soreness Alert',text:`${soreMuscles.join(', ')} soreness is high for today's ${sessionType} session. Consider reducing load on these movements by 15–20% or substituting.`});
  }

  // Sleep
  if(h<6){
    recs.push({icon:'😴',title:'Poor Sleep',text:'Under 6 hours significantly impairs strength output and recovery. Reduce session intensity by 20–25%. Prioritise technique over load today.'});
  } else if(h<7||sq<=4){
    recs.push({icon:'😴',title:'Sleep Below Target',text:'Sleep was below optimal. Warm up thoroughly and gauge how your body feels before pushing hard on primary compounds.'});
  }

  // Score-based
  if(score>=80){
    recs.push({icon:'💪',title:'Full Training',text:'Your recovery markers are strong. Train as programmed. This is a good session to push for progressive overload on primary compounds.'});
  } else if(score>=60){
    recs.push({icon:'↘️',title:'Load Reduction',text:'Reduce primary compound loads by 10–15%. Keep volume (sets/reps) the same. Focus on quality of movement over maximum weight.'});
    recs.push({icon:'⏸️',title:'Skip High-Intensity',text:'Avoid max-effort sets or PR attempts today. Save those for when your readiness score is above 80.'});
  } else if(score>=40){
    recs.push({icon:'🔄',title:'Active Recovery Mode',text:'Today is not a day to challenge your body. Perform mobility work, light movement at 40–50% usual load, or swap to a full rest day.'});
    recs.push({icon:'📉',title:'Reduce Volume',text:'Cut sets by 40–50%. Do 2 sets instead of 4–5. Focus on movement quality. End the session if you feel worse during warm-up.'});
  } else {
    recs.push({icon:'🛌',title:'Take a Full Rest Day',text:'Your body is in significant recovery debt. Training today risks injury and will delay your overall progress. Sleep, eat well, hydrate.'});
    recs.push({icon:'🧘',title:'Active Rest Options',text:'Light walking, gentle stretching, or a 10-minute mobility flow are the most beneficial activities today.'});
  }

  // Stress
  if(stress>=7){
    recs.push({icon:'🧠',title:'High Stress',text:'Psychological stress elevates cortisol, which competes with recovery. Keep the session short and enjoyable — not grinding. This is not the day to test yourself.'});
  }

  // HR spike
  const baseline=DB.getHRBaseline();
  if(data.restingHR>0&&baseline&&(data.restingHR-baseline)>7){
    recs.push({icon:'❤️',title:'Elevated Resting HR',text:`Your resting HR is ${data.restingHR-baseline}bpm above your baseline of ${baseline}bpm. This commonly signals incomplete recovery, mild illness, or dehydration. Drink water and reassess during warm-up.`});
  }

  return recs;
}

        <div style="font-size:10px;color:var(--text4);margin-top:3px">Complete your daily readiness check-in</div>
      </div>
      <button class="btn btn-secondary" style="white-space:nowrap" onclick="event.stopPropagation();nav('readiness')">CHECK IN</button>
    </div>`;
  }
  const st=getReadinessStatus(e.score);
  const r=28;const circ=2*Math.PI*r;const dash=circ*(e.score/100);
  return`<div class="section-label">TODAY'S READINESS</div>
  <div style="margin:0 16px 12px;background:var(--surf);border:1px solid var(--border);border-left:3px solid ${st.color};border-radius:6px;padding:14px 16px;display:flex;align-items:center;gap:16px;cursor:pointer" onclick="nav('readiness')">
    <div style="position:relative;width:64px;height:64px;flex-shrink:0">
      <svg width="64" height="64" viewBox="0 0 64 64" style="transform:rotate(-90deg)">
        <circle cx="32" cy="32" r="${r}" fill="none" stroke="var(--surf3)" stroke-width="6"/>
        <circle cx="32" cy="32" r="${r}" fill="none" stroke="${st.color}" stroke-width="6"
          stroke-dasharray="${dash.toFixed(1)} ${circ.toFixed(1)}" stroke-linecap="round"/>
      </svg>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center">
        <div style="font-family:var(--font-display);font-size:18px;font-weight:900;color:${st.color};line-height:1">${e.score}</div>
      </div>
    </div>
    <div style="flex:1">
      <div style="font-family:var(--font-display);font-size:17px;font-weight:900;letter-spacing:.02em;color:${st.color}">${st.label}</div>
      <div style="font-size:9px;color:var(--text4);margin-top:3px;line-height:1.6">
        😴 ${parseFloat(e.data.sleepHours).toFixed(1)}h sleep · Q${e.data.sleepQuality}/10
        ${e.data.restingHR>0?` · ♥ ${e.data.restingHR}bpm`:''}
      </div>
    </div>
    <div style="font-size:14px;color:var(--text4)">›</div>
  </div>`;
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
render();
</script>
</body>
</html>
